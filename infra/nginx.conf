# ============================================================
# VulnScan Pro - Configuración Nginx
# /etc/nginx/sites-available/vulnscan
# ============================================================

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=scan:10m rate=2r/m;

# Upstream backends
upstream vulnscan_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

upstream vulnscan_frontend {
    server 127.0.0.1:3000;
    keepalive 32;
}

# ── HTTP → HTTPS redirect (activar cuando tengas SSL) ────────────────────────
# server {
#     listen 80;
#     server_name tu-dominio.com www.tu-dominio.com;
#     return 301 https://$host$request_uri;
# }

# ── Servidor principal ───────────────────────────────────────────────────────
server {
    listen 80;
    # listen 443 ssl http2;    # Descomentar para HTTPS
    server_name 149.34.48.176;  # Cambiar por tu dominio

    # ── SSL (descomentar después de certbot) ─────────────────────────────────
    # ssl_certificate /etc/letsencrypt/live/tu-dominio.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/tu-dominio.com/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-SHA384;
    # ssl_prefer_server_ciphers on;
    # ssl_session_cache shared:SSL:10m;
    # ssl_session_timeout 10m;
    # ssl_stapling on;
    # ssl_stapling_verify on;

    # ── Logs ─────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/vulnscan_access.log;
    error_log  /var/log/nginx/vulnscan_error.log;

    # ── Security Headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;  # Solo HTTPS

    # ── Compression ──────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/xml application/rss+xml application/atom+xml image/svg+xml;
    gzip_min_length 1000;

    # ── Buffer settings ───────────────────────────────────────────────────────
    client_max_body_size 10M;
    client_body_buffer_size 128k;

    # ── Backend API - login (rate limit estricto) ─────────────────────────────
    location = /api/auth/login {
        limit_req zone=login burst=3 nodelay;
        proxy_pass http://vulnscan_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Backend API - scans (rate limit moderado) ─────────────────────────────
    location = /api/scans/ {
        limit_req zone=scan burst=5 nodelay;
        proxy_pass http://vulnscan_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
    }

    # ── Backend API - general ─────────────────────────────────────────────────
    location ~ ^/(api|health|docs|redoc|openapi) {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://vulnscan_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_read_timeout 300;
        proxy_connect_timeout 10;
        proxy_send_timeout 300;
    }

    # ── Next.js static assets (cache agresivo) ────────────────────────────────
    location /_next/static/ {
        proxy_pass http://vulnscan_frontend;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /favicon.ico {
        proxy_pass http://vulnscan_frontend;
        expires 1d;
        access_log off;
    }

    # ── Frontend Next.js ─────────────────────────────────────────────────────
    location / {
        proxy_pass http://vulnscan_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60;
    }

    # ── Deny sensitive files ──────────────────────────────────────────────────
    location ~ /\. {
        deny all;
        return 404;
    }
    location ~ \.(env|git|sql|bak|log|conf)$ {
        deny all;
        return 404;
    }

    # ── Custom error pages ────────────────────────────────────────────────────
    error_page 404 /404;
    error_page 500 502 503 504 /500;
}
