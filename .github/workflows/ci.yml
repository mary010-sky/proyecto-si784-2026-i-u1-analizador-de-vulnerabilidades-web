name: CI — Web Vulnerability Scanner

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: false

permissions:
  contents: read
  checks: write
  pull-requests: write
  pages: write
  id-token: write

jobs:
  # ─────────────────────────────────────────────────────────────
  # 1. Tests unitarios + BDD + cobertura
  # ─────────────────────────────────────────────────────────────
  backend-tests:
    name: Tests Backend (unitarios + BDD + cobertura)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias de desarrollo
        run: pip install -r requirements-dev.txt

      - name: Ejecutar tests unitarios con cobertura
        run: |
          pytest tests/test_scanner.py -v \
            --junit-xml=unit-results.xml \
            --html=unit-report.html --self-contained-html \
            2>&1 | tee unit-output.txt

      - name: Ejecutar escenarios BDD
        run: |
          pytest tests/steps/ -v --no-cov \
            --junit-xml=bdd-results.xml \
            --html=bdd-pytest-report.html --self-contained-html \
            2>&1 | tee bdd-output.txt

      - name: Anotar cobertura en GH Actions (PRs)
        uses: MishaKav/pytest-coverage-comment@main
        if: github.event_name == 'pull_request'
        with:
          pytest-xml-coverage-path: backend/coverage.xml
          title: Cobertura de Pruebas — Web Vulnerability Scanner

      - name: Generar reporte HTML de tests unitarios
        if: always()
        run: |
          python3 - <<'PYEOF'
          import xml.etree.ElementTree as ET, pathlib, html, re
          from datetime import datetime

          xml_path = pathlib.Path("unit-results.xml")
          if not xml_path.exists():
              print("unit-results.xml no encontrado"); exit(0)

          tree = ET.parse(xml_path)
          root = tree.getroot()
          suite = root if root.tag == "testsuite" else root.find("testsuite")
          tests   = int(suite.get("tests",   0))
          failures= int(suite.get("failures", 0))
          errors  = int(suite.get("errors",   0))
          skipped = int(suite.get("skipped",  0))
          passed  = tests - failures - errors - skipped
          ts      = datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC")
          pct     = round(passed / tests * 100) if tests else 0
          bar_color = "#27ae60" if failures == 0 else "#c0392b"

          # Agrupar por clase
          groups = {}
          for tc in suite.findall("testcase"):
              cls  = tc.get("classname","").split(".")[-1]
              name = tc.get("name","")
              time_s = float(tc.get("time","0"))
              fail = tc.find("failure")
              err  = tc.find("error")
              if fail is not None or err is not None:
                  node = fail if fail is not None else err
                  status = "FALLO"
                  detail = html.escape((node.text or "")[:500])
              else:
                  status = "PASO"
                  detail = ""
              groups.setdefault(cls, []).append((name, time_s, status, detail))

          group_html = ""
          for cls, cases in sorted(groups.items()):
              cls_pass = sum(1 for _,_,s,_ in cases if s == "PASO")
              cls_total = len(cases)
              cls_color = "#27ae60" if cls_pass == cls_total else "#c0392b"
              rows = ""
              for name, t, status, detail in cases:
                  label = name.replace("test_","").replace("_"," ")
                  badge = (f'<span style="background:#27ae60;color:white;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600">✓ PASÓ</span>'
                           if status == "PASO" else
                           f'<span style="background:#c0392b;color:white;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600">✗ FALLÓ</span>')
                  detail_cell = f'<details><summary style="color:#c0392b;cursor:pointer;font-size:11px">Ver error</summary><pre style="background:#fff5f5;padding:8px;border-radius:4px;font-size:10px;white-space:pre-wrap">{detail}</pre></details>' if detail else '<span style="color:#aaa;font-size:11px">—</span>'
                  rows += f"<tr><td style='width:80px'>{badge}</td><td style='font-size:12px'>{html.escape(label)}</td><td style='width:60px;text-align:right;color:#888;font-size:11px'>{t:.3f}s</td><td>{detail_cell}</td></tr>"
              group_html += f"""
              <div class="group">
                <div class="group-header" style="border-left:4px solid {cls_color}">
                  <span class="group-name">{html.escape(cls)}</span>
                  <span class="group-badge" style="background:{cls_color}">{cls_pass}/{cls_total}</span>
                </div>
                <table><thead><tr><th>Estado</th><th>Test</th><th>Tiempo</th><th>Detalle</th></tr></thead>
                <tbody>{rows}</tbody></table>
              </div>"""

          page = f"""<!DOCTYPE html><html lang="es"><head><meta charset="utf-8">
          <title>Tests Unitarios — Web Vulnerability Scanner</title>
          <style>
          *{{box-sizing:border-box}}body{{font-family:system-ui;margin:0;background:#f4f6f9}}
          .header{{background:linear-gradient(135deg,#1a1f35,#2c3e50);color:white;padding:24px 32px}}
          h1{{margin:0;font-size:22px;font-weight:800}}.header p{{margin:6px 0 0;opacity:.7;font-size:13px}}
          .container{{padding:24px 32px}}.cards{{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}}
          .card{{background:white;border-radius:8px;padding:14px 20px;min-width:110px;
                 border-top:4px solid #ccc;box-shadow:0 1px 6px rgba(0,0,0,.08)}}
          .card .val{{font-size:28px;font-weight:800;margin:0}}.card .lbl{{font-size:11px;color:#888;margin-top:2px}}
          .bar-bg{{background:#e0e0e0;border-radius:6px;height:12px;margin-bottom:24px}}
          .bar{{background:{bar_color};height:12px;border-radius:6px;width:{pct}%;transition:width .5s}}
          .group{{background:white;border-radius:10px;margin-bottom:16px;overflow:hidden;
                  box-shadow:0 1px 6px rgba(0,0,0,.08)}}
          .group-header{{display:flex;align-items:center;justify-content:space-between;
                         padding:12px 16px;background:#f8fafc}}
          .group-name{{font-weight:700;font-size:13px;color:#2c3e50}}
          .group-badge{{color:white;padding:2px 10px;border-radius:10px;font-size:11px;font-weight:700}}
          table{{width:100%;border-collapse:collapse}}
          th{{background:#2c3e50;color:white;padding:8px 14px;text-align:left;font-size:11px}}
          td{{padding:8px 14px;border-bottom:1px solid #f0f0f0;vertical-align:middle}}
          tr:last-child td{{border-bottom:none}}tr:hover{{background:#f8fafc}}
          details summary{{list-style:none}}details summary::-webkit-details-marker{{display:none}}
          pre{{margin:4px 0 0;overflow-x:auto}}
          </style></head>
          <body>
          <div class="header">
            <h1>🧪 Tests Unitarios — Web Vulnerability Scanner</h1>
            <p>pytest · scanner.py · {ts}</p>
          </div>
          <div class="container">
            <div class="cards">
              <div class="card" style="border-color:{bar_color}"><p class="val">{pct}%</p><p class="lbl">Pasaron</p></div>
              <div class="card" style="border-color:#27ae60"><p class="val">{passed}</p><p class="lbl">Exitosos</p></div>
              <div class="card" style="border-color:#c0392b"><p class="val">{failures+errors}</p><p class="lbl">Fallaron</p></div>
              <div class="card" style="border-color:#2980b9"><p class="val">{tests}</p><p class="lbl">Total</p></div>
              <div class="card" style="border-color:#95a5a6"><p class="val">{len(groups)}</p><p class="lbl">Clases</p></div>
            </div>
            <div class="bar-bg"><div class="bar"></div></div>
            {group_html}
          </div></body></html>"""

          pathlib.Path("unit-report-custom.html").write_text(page, encoding="utf-8")
          print(f"Tests unitarios: {passed}/{tests} pasaron ({pct}%) en {len(groups)} clases")
          PYEOF

      - name: Generar reporte HTML de BDD
        if: always()
        run: |
          python3 - <<'PYEOF'
          import xml.etree.ElementTree as ET, pathlib, html
          from datetime import datetime

          xml_path = pathlib.Path("bdd-results.xml")
          if not xml_path.exists():
              print("bdd-results.xml no encontrado"); exit(0)

          tree = ET.parse(xml_path)
          root = tree.getroot()
          suite = root if root.tag == "testsuite" else root.find("testsuite")
          tests   = int(suite.get("tests",   0))
          failures= int(suite.get("failures", 0))
          errors  = int(suite.get("errors",   0))
          skipped = int(suite.get("skipped",  0))
          passed  = tests - failures - errors - skipped
          ts      = datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC")
          pct     = round(passed / tests * 100) if tests else 0
          bar_color = "#27ae60" if failures == 0 else "#c0392b"

          rows = ""
          for tc in suite.findall("testcase"):
              name   = html.escape(tc.get("name","").replace("test_","").replace("_"," ").title())
              cls    = html.escape(tc.get("classname","").split(".")[-1])
              time_s = tc.get("time","0")
              fail   = tc.find("failure")
              if fail is not None:
                  badge  = '<span style="background:#c0392b;color:white;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600">✗ FALLÓ</span>'
                  detail = f'<details><summary style="color:#c0392b;cursor:pointer;font-size:11px">Ver error</summary><pre style="background:#fff5f5;padding:8px;border-radius:4px;font-size:10px;white-space:pre-wrap">{html.escape((fail.text or "")[:600])}</pre></details>'
              else:
                  badge  = '<span style="background:#27ae60;color:white;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600">✓ PASÓ</span>'
                  detail = '<span style="color:#aaa;font-size:11px">—</span>'
              rows += f"<tr><td>{badge}</td><td style='font-size:12px'>{name}</td><td style='color:#666;font-size:11px'>{cls}</td><td style='color:#888;font-size:11px;text-align:right'>{time_s}s</td><td>{detail}</td></tr>"

          page = f"""<!DOCTYPE html><html lang="es"><head><meta charset="utf-8">
          <title>BDD — Web Vulnerability Scanner</title>
          <style>
          *{{box-sizing:border-box}}body{{font-family:system-ui;margin:0;background:#f4f6f9}}
          .header{{background:linear-gradient(135deg,#1a3a1a,#27ae60);color:white;padding:24px 32px}}
          h1{{margin:0;font-size:22px;font-weight:800}}.header p{{margin:6px 0 0;opacity:.8;font-size:13px}}
          .container{{padding:24px 32px}}.cards{{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}}
          .card{{background:white;border-radius:8px;padding:14px 20px;min-width:110px;
                 border-top:4px solid #ccc;box-shadow:0 1px 6px rgba(0,0,0,.08)}}
          .card .val{{font-size:28px;font-weight:800;margin:0}}.card .lbl{{font-size:11px;color:#888;margin-top:2px}}
          .bar-bg{{background:#e0e0e0;border-radius:6px;height:12px;margin-bottom:24px}}
          .bar{{background:{bar_color};height:12px;border-radius:6px;width:{pct}%}}
          table{{width:100%;border-collapse:collapse;background:white;border-radius:10px;
                 overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.08)}}
          th{{background:#27ae60;color:white;padding:10px 14px;text-align:left;font-size:11px}}
          td{{padding:9px 14px;border-bottom:1px solid #f0f0f0;vertical-align:middle}}
          tr:last-child td{{border-bottom:none}}tr:hover{{background:#f8fafc}}
          details summary{{list-style:none;cursor:pointer}}
          </style></head>
          <body>
          <div class="header">
            <h1>🥒 Pruebas BDD (Gherkin) — Web Vulnerability Scanner</h1>
            <p>pytest-bdd · Escenarios de comportamiento · {ts}</p>
          </div>
          <div class="container">
            <div class="cards">
              <div class="card" style="border-color:{bar_color}"><p class="val">{pct}%</p><p class="lbl">Pasaron</p></div>
              <div class="card" style="border-color:#27ae60"><p class="val">{passed}</p><p class="lbl">Exitosos</p></div>
              <div class="card" style="border-color:#c0392b"><p class="val">{failures}</p><p class="lbl">Fallaron</p></div>
              <div class="card" style="border-color:#2980b9"><p class="val">{tests}</p><p class="lbl">Total</p></div>
            </div>
            <div class="bar-bg"><div class="bar"></div></div>
            <table><thead><tr><th>Estado</th><th>Escenario</th><th>Feature</th><th>Tiempo</th><th>Detalle</th></tr></thead>
            <tbody>{rows if rows else '<tr><td colspan=5 style="text-align:center;padding:20px;color:#888">Sin escenarios BDD ejecutados</td></tr>'}</tbody>
            </table>
          </div></body></html>"""

          pathlib.Path("bdd-report.html").write_text(page, encoding="utf-8")
          print(f"BDD: {passed}/{tests} pasaron ({pct}%)")
          PYEOF

      - name: Subir reporte de cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-coverage
          path: |
            backend/htmlcov/
            backend/coverage.xml

      - name: Subir reporte tests unitarios
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-unit-tests
          path: |
            backend/unit-report-custom.html
            backend/unit-report.html
            backend/unit-results.xml

      - name: Subir reporte BDD
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-bdd
          path: |
            backend/bdd-results.xml
            backend/bdd-report.html

  # ─────────────────────────────────────────────────────────────
  # 2. Análisis estático — Semgrep
  # ─────────────────────────────────────────────────────────────
  semgrep:
    name: Análisis estático — Semgrep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar Semgrep
        run: pip install semgrep

      - name: Ejecutar Semgrep (Python + OWASP Top 10)
        run: |
          semgrep scan \
            --config "p/python" \
            --config "p/security-audit" \
            --config "p/owasp-top-ten" \
            --json --output semgrep-report.json \
            backend/ || true

      - name: Generar reporte HTML de Semgrep
        run: |
          python3 - <<'PYEOF'
          import json, pathlib, html
          from datetime import datetime

          data = json.loads(pathlib.Path("semgrep-report.json").read_text())
          results = data.get("results", [])
          sev_counts = {"ERROR": 0, "WARNING": 0, "INFO": 0}
          rows = ""
          for r in results:
              sev = r.get("extra", {}).get("severity", "INFO").upper()
              sev_counts[sev] = sev_counts.get(sev, 0) + 1
              msg = html.escape(r.get("extra", {}).get("message", "")[:200])
              path = html.escape(r.get("path", "").replace("backend/", ""))
              line = r.get("start", {}).get("line", "")
              check = html.escape(r.get("check_id", "").split(".")[-1])
              color = {"ERROR": "#c0392b", "WARNING": "#e67e22", "INFO": "#2980b9"}.get(sev, "#888")
              badge = f'<span style="background:{color};color:white;padding:2px 8px;border-radius:10px;font-size:11px">{sev}</span>'
              rows += f"<tr><td>{badge}</td><td><code>{path}:{line}</code></td><td>{check}</td><td>{msg}</td></tr>"

          ts = datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC")
          page = f"""<!DOCTYPE html><html lang="es"><head><meta charset="utf-8">
          <title>Semgrep — Web Vulnerability Scanner</title>
          <style>body{{font-family:system-ui;margin:0;background:#f4f6f9}}
          .header{{background:#2c3e50;color:white;padding:20px 30px}}h1{{margin:0;font-size:22px}}
          .header p{{margin:4px 0 0;opacity:.7;font-size:13px}}.container{{padding:20px 30px}}
          .cards{{display:flex;gap:12px;margin-bottom:20px}}.card{{background:white;border-radius:8px;
          padding:14px 18px;min-width:110px;border-top:3px solid #ccc;box-shadow:0 1px 4px rgba(0,0,0,.08)}}
          .card .val{{font-size:28px;font-weight:800;margin:0}}.card .lbl{{font-size:11px;color:#888;margin-top:2px}}
          table{{width:100%;border-collapse:collapse;background:white;border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.08)}}
          th{{background:#2c3e50;color:white;padding:10px 14px;text-align:left;font-size:12px}}
          td{{padding:9px 14px;border-bottom:1px solid #f0f0f0;font-size:12px;vertical-align:top}}
          code{{background:#f0f4f8;padding:2px 5px;border-radius:3px;font-size:11px}}</style></head>
          <body><div class="header"><h1>🔍 Semgrep — Web Vulnerability Scanner</h1>
          <p>OWASP Top 10 + Python Security · {ts}</p></div>
          <div class="container"><div class="cards">
          <div class="card"><p class="val">{sev_counts['ERROR']}</p><p class="lbl">Críticos</p></div>
          <div class="card"><p class="val">{sev_counts['WARNING']}</p><p class="lbl">Advertencias</p></div>
          <div class="card"><p class="val">{len(results)}</p><p class="lbl">Total</p></div></div>
          <table><thead><tr><th>Severidad</th><th>Archivo</th><th>Regla</th><th>Descripción</th></tr></thead>
          <tbody>{'<tr><td colspan=4 style="text-align:center;color:#27ae60;padding:20px">✅ Sin hallazgos — código pasa análisis estático</td></tr>' if not rows else rows}
          </tbody></table></div></body></html>"""

          pathlib.Path("semgrep-report.html").write_text(page)
          print(f"Semgrep: {len(results)} hallazgos")
          PYEOF

      - name: Subir reporte Semgrep
        uses: actions/upload-artifact@v4
        with:
          name: report-semgrep
          path: semgrep-report.html

  # ─────────────────────────────────────────────────────────────
  # 3. SonarCloud
  # ─────────────────────────────────────────────────────────────
  sonarcloud:
    name: Análisis estático — SonarCloud
    runs-on: ubuntu-latest
    needs: backend-tests
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Descargar reporte de cobertura
        uses: actions/download-artifact@v4
        with:
          name: report-coverage
          path: backend

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

  # ─────────────────────────────────────────────────────────────
  # 4. Pruebas de mutaciones — mutmut
  # ─────────────────────────────────────────────────────────────
  mutation-tests:
    name: Pruebas de Mutaciones — mutmut
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias de desarrollo
        run: pip install -r requirements-dev.txt

      - name: Ejecutar mutmut
        run: mutmut run --no-progress 2>&1 | tee mutmut-output.txt || true

      - name: Generar reporte HTML de mutaciones (con diffs)
        if: always()
        run: |
          python3 - <<'PYEOF'
          import subprocess, pathlib, html, re
          from datetime import datetime

          def run(cmd):
              r = subprocess.run(cmd, shell=True, capture_output=True, text=True)
              return (r.stdout + r.stderr).strip()

          # ── Obtener resumen ──────────────────────────────────────────────
          results_raw = run("mutmut results")

          killed = survived = timeout = suspicious = 0
          survived_ids = []
          killed_ids   = []

          for line in results_raw.splitlines():
              line = line.strip()
              if not line:
                  continue
              # Formato: "Survived 🙁 (N)"  o  "Killed 🎿 (N)"
              m = re.search(r'survived.*?(\d+)', line, re.IGNORECASE)
              if m: survived = int(m.group(1))
              m = re.search(r'killed.*?(\d+)', line, re.IGNORECASE)
              if m: killed = int(m.group(1))
              m = re.search(r'timeout.*?(\d+)', line, re.IGNORECASE)
              if m: timeout = int(m.group(1))
              m = re.search(r'suspicious.*?(\d+)', line, re.IGNORECASE)
              if m: suspicious = int(m.group(1))
              # Líneas con IDs: "---- app/scanner.py (N) ----"  o  "3-6, 9-10, ..."
              if re.match(r'^[\d,\s\-]+$', line):
                  for part in line.split(','):
                      part = part.strip()
                      if '-' in part:
                          a, b = part.split('-', 1)
                          try: survived_ids.extend(range(int(a), int(b)+1))
                          except: pass
                      elif part.isdigit():
                          survived_ids.append(int(part))

          total = killed + survived + timeout + suspicious
          score = round(killed / total * 100) if total else 0
          bar_color = "#27ae60" if score >= 70 else ("#e67e22" if score >= 40 else "#c0392b")
          ts = datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC")

          # ── Obtener diffs de mutantes sobrevivientes (máx 80) ───────────
          survived_rows = ""
          for mid in survived_ids[:80]:
              diff_raw = run(f"mutmut show {mid}")
              if not diff_raw:
                  continue
              lines_diff = diff_raw.splitlines()
              # Extraer línea de origen del diff (--- / +++ o encabezado)
              location = ""
              for dl in lines_diff:
                  if dl.startswith("---") or dl.startswith("+++"):
                      location = html.escape(dl)
                      break

              diff_colored = ""
              for dl in lines_diff:
                  esc = html.escape(dl)
                  if dl.startswith("---") or dl.startswith("+++"):
                      diff_colored += f'<span style="color:#888;font-size:10px">{esc}</span>\n'
                  elif dl.startswith("-") and not dl.startswith("---"):
                      diff_colored += f'<span style="background:#ffeef0;color:#c0392b;display:block">{esc}</span>'
                  elif dl.startswith("+") and not dl.startswith("+++"):
                      diff_colored += f'<span style="background:#e6ffed;color:#27ae60;display:block">{esc}</span>'
                  elif dl.startswith("@@"):
                      diff_colored += f'<span style="color:#2980b9;font-size:10px">{esc}</span>\n'
                  else:
                      diff_colored += f'<span>{esc}</span>\n'

              survived_rows += f"""
              <tr>
                <td style="width:50px;text-align:center;font-weight:700;color:#c0392b">#{mid}</td>
                <td>
                  <details>
                    <summary style="cursor:pointer;font-size:12px;color:#c0392b;font-weight:600;padding:4px 0">
                      🔴 Mutante #{mid} sobrevivió — clic para ver cambio
                    </summary>
                    <pre style="background:#f8f9fa;border:1px solid #dee2e6;border-radius:6px;
                                padding:12px;margin:8px 0;font-size:11px;overflow-x:auto;
                                font-family:'Courier New',monospace;line-height:1.6">{diff_colored}</pre>
                  </details>
                </td>
              </tr>"""

          # ── Killed IDs compactos ─────────────────────────────────────────
          killed_raw = run("mutmut results --only-killed 2>/dev/null || true")

          page = f"""<!DOCTYPE html><html lang="es"><head><meta charset="utf-8">
          <title>Mutaciones — Web Vulnerability Scanner</title>
          <style>
          *{{box-sizing:border-box}}body{{font-family:system-ui;margin:0;background:#f4f6f9}}
          .header{{background:linear-gradient(135deg,#1a1f35,#8e44ad);color:white;padding:24px 32px}}
          h1{{margin:0;font-size:22px;font-weight:800}}.header p{{margin:6px 0 0;opacity:.8;font-size:13px}}
          .container{{padding:24px 32px}}.cards{{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap}}
          .card{{background:white;border-radius:8px;padding:14px 20px;min-width:120px;
                 border-top:4px solid #ccc;box-shadow:0 1px 6px rgba(0,0,0,.08)}}
          .card .val{{font-size:28px;font-weight:800;margin:0}}.card .lbl{{font-size:11px;color:#888;margin-top:2px}}
          .bar-outer{{background:#e0e0e0;border-radius:8px;height:20px;margin-bottom:6px;overflow:hidden}}
          .bar-inner{{background:{bar_color};height:20px;width:{score}%;display:flex;
                      align-items:center;justify-content:flex-end;padding-right:10px;border-radius:8px}}
          .bar-inner span{{color:white;font-size:12px;font-weight:800}}
          .bar-label{{font-size:12px;color:#666;margin-bottom:24px}}
          h2{{font-size:15px;color:#2c3e50;margin:24px 0 12px;border-left:4px solid #c0392b;padding-left:10px}}
          h2.killed{{border-color:#27ae60}}
          table{{width:100%;border-collapse:collapse;background:white;border-radius:10px;
                 overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.08);margin-bottom:24px}}
          th{{background:#8e44ad;color:white;padding:10px 14px;text-align:left;font-size:11px}}
          td{{padding:8px 14px;border-bottom:1px solid #f0f0f0;vertical-align:top}}
          tr:last-child td{{border-bottom:none}}
          details summary{{list-style:none}}details summary::-webkit-details-marker{{display:none}}
          pre.raw{{background:#f0f4f8;border:1px solid #dee2e6;border-radius:6px;
                   padding:12px;font-size:11px;overflow-x:auto;white-space:pre-wrap;
                   font-family:'Courier New',monospace;margin-top:12px}}
          .tip{{background:#fff9e6;border:1px solid #f0c040;border-radius:8px;
                padding:12px 16px;font-size:12px;color:#856404;margin-bottom:20px}}
          </style></head>
          <body>
          <div class="header">
            <h1>🧬 Pruebas de Mutaciones — Web Vulnerability Scanner</h1>
            <p>mutmut · app/scanner.py · {ts}</p>
          </div>
          <div class="container">
            <div class="cards">
              <div class="card" style="border-color:{bar_color}">
                <p class="val">{score}%</p><p class="lbl">Mutation Score</p>
              </div>
              <div class="card" style="border-color:#27ae60">
                <p class="val">{killed}</p><p class="lbl">🎯 Matados</p>
              </div>
              <div class="card" style="border-color:#c0392b">
                <p class="val">{survived}</p><p class="lbl">⚠️ Sobrevivieron</p>
              </div>
              <div class="card" style="border-color:#e67e22">
                <p class="val">{timeout}</p><p class="lbl">⏱ Timeout</p>
              </div>
              <div class="card" style="border-color:#95a5a6">
                <p class="val">{total}</p><p class="lbl">Total</p>
              </div>
            </div>
            <div class="bar-outer"><div class="bar-inner"><span>{score}%</span></div></div>
            <p class="bar-label">Score ≥ 70% es bueno · ≥ 80% es excelente · objetivo: matar más mutantes</p>

            <div class="tip">
              💡 <strong>¿Qué es un mutante sobreviviente?</strong> mutmut cambia una pequeña parte del código
              (ej: <code>==</code> → <code>!=</code>, elimina un elemento de una lista) y ejecuta los tests.
              Si los tests <strong>no detectan</strong> el cambio, el mutante "sobrevive" — indica que esa rama
              del código no está bien cubierta. Cada bloque <em>clic para ver cambio</em> muestra exactamente
              qué se modificó.
            </div>

            <h2>⚠️ Mutantes Sobrevivientes ({survived}) — requieren tests adicionales</h2>
            <table>
              <thead><tr><th>#</th><th>Cambio introducido por mutmut (diff)</th></tr></thead>
              <tbody>
                {survived_rows if survived_rows else
                  '<tr><td colspan=2 style="text-align:center;padding:20px;color:#27ae60;font-weight:600">✅ Todos los mutantes fueron detectados por los tests</td></tr>'}
              </tbody>
            </table>

            <h2 class="killed">✅ Resumen de ejecución completa</h2>
            <pre class="raw">{html.escape(results_raw[:4000])}</pre>
          </div></body></html>"""

          pathlib.Path("mutations-report.html").write_text(page, encoding="utf-8")
          print(f"Mutation score: {score}% ({killed} matados / {survived} sobrevivieron / {total} total)")
          PYEOF

      - name: Subir reporte de mutaciones
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-mutations
          path: backend/mutations-report.html

  # ─────────────────────────────────────────────────────────────
  # 5. Pruebas de UI — Playwright (con video)
  # ─────────────────────────────────────────────────────────────
  playwright:
    name: Pruebas de UI — Playwright
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Instalar Playwright y navegadores
        run: |
          npm install -D @playwright/test
          npx playwright install chromium --with-deps

      - name: Build de Next.js
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

      - name: Iniciar servidor Next.js
        run: npx next start &
        env:
          PORT: 3000

      - name: Esperar a que el servidor esté listo
        run: |
          for i in {1..30}; do
            curl -s http://localhost:3000 > /dev/null && echo "Servidor listo" && break
            echo "Esperando... intento $i"
            sleep 2
          done

      - name: Ejecutar pruebas Playwright con video
        run: BASE_URL=http://localhost:3000 npx playwright test
        continue-on-error: true

      - name: Subir reporte y videos Playwright
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: report-playwright
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 14

  # ─────────────────────────────────────────────────────────────
  # 6. Publicar TODOS los reportes en GH Pages (deploy único)
  # ─────────────────────────────────────────────────────────────
  publish-pages:
    name: Publicar reportes en GH Pages
    runs-on: ubuntu-latest
    needs: [backend-tests, semgrep, mutation-tests, playwright]

    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && always()
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Descargar reporte de cobertura
        uses: actions/download-artifact@v4
        with:
          name: report-coverage
          path: _site/coverage
        continue-on-error: true

      - name: Descargar reporte tests unitarios
        uses: actions/download-artifact@v4
        with:
          name: report-unit-tests
          path: _site/unit-tests
        continue-on-error: true

      - name: Descargar reporte BDD
        uses: actions/download-artifact@v4
        with:
          name: report-bdd
          path: _site/bdd
        continue-on-error: true

      - name: Descargar reporte Semgrep
        uses: actions/download-artifact@v4
        with:
          name: report-semgrep
          path: _site/semgrep
        continue-on-error: true

      - name: Descargar reporte Mutaciones
        uses: actions/download-artifact@v4
        with:
          name: report-mutations
          path: _site/mutations
        continue-on-error: true

      - name: Descargar reporte Playwright
        uses: actions/download-artifact@v4
        with:
          name: report-playwright
          path: _site/playwright
        continue-on-error: true

      - name: Generar página índice
        run: |
          mkdir -p _site
          cat > _site/index.html <<'HTMLEOF'
          <!DOCTYPE html><html lang="es"><head><meta charset="utf-8">
          <title>Web Vulnerability Scanner — Reportes CI</title>
          <style>
