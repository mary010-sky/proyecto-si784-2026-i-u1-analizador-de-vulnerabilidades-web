          .header{background:linear-gradient(135deg,#1a1f35,#2c3e50);color:white;padding:30px 40px}
          h1{margin:0;font-size:26px;font-weight:800}
          .header p{margin:8px 0 0;opacity:.7;font-size:14px}
          .grid{display:flex;flex-wrap:wrap;gap:16px;padding:30px 40px}
          .card{background:white;border-radius:12px;padding:22px 26px;width:220px;
                box-shadow:0 2px 12px rgba(0,0,0,.08);text-decoration:none;color:inherit;
                border-top:4px solid #2c3e50;transition:transform .15s,box-shadow .15s;display:block}
          .card:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(0,0,0,.12)}
          .card.green{border-color:#27ae60}.card.blue{border-color:#2980b9}
